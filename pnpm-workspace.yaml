packages:
  - apps/*
  - packages/*
  - tools/*

catalogMode: prefer

catalog:
  "@types/node": ^24.13.1
  "@types/react": "^19.2.17"
  "@types/react-dom": "^19.2.3"
  "react": "^19.2.6"
  "react-dom": "^19.2.6"
  "react-router": "^7.15.1"
  typescript: ~6.0.3
  vite: npm:@voidzero-dev/vite-plus-core@latest
  vitest: npm:@voidzero-dev/vite-plus-test@latest
  vite-plus: latest
  zod: ^4.4.3
  "@e7w/easy-model": ^0.3.6
  "@typescript/native-preview": 7.0.0-dev.20260524.1
  "@rolldown/pluginutils": ^1.0.1
  glob: ^13.0.6
  chokidar: ^5.0.0
  nprogress: ^0.2.0
  "@types/nprogress": ^0.2.3
  axios: ^1.16.1
  eslint-plugin-unused-imports: ^4.4.1
  eslint-plugin-simple-import-sort: ^13.0.0
  tailwindcss: ^4.3.0
  "@tailwindcss/vite": ^4.3.0
  "@storybook/addon-vitest": ^10.4.1
  "@vitest/browser-playwright": ^4.1.8
  playwright: ^1.60.0
  postcss: ^8.5.15
  autoprefixer: ^10.5.0
  "@tailwindcss/postcss": ^4.3.0
  postcss-load-config: ^6.0.1
  "@tsdown/css": ^0.22.1
  postcss-import: ^16.1.1
  "@playwright/test": ^1.60.0
  dayjs: ^1.11.21
  decimal.js-light: ^2.5.1
  "@micro-zoe/micro-app": 1.0.0-rc.30
  antd: ^6.4.3
overrides:
  vite: "catalog:"
  vitest: "catalog:"
peerDependencyRules:
  allowAny:
    - vite
    - vitest
  allowedVersions:
    vite: "*"
    vitest: "*"
minimumReleaseAgeExclude:
  - "@e7w/easy-model@0.3.6"
allowBuilds:
  esbuild: true
